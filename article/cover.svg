<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2350 1000">
  <style>
    text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10151F"/>
      <stop offset="1" stop-color="#1C2433"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#243044" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="2350" height="1000" fill="url(#bg)"/>
  <rect width="2350" height="1000" fill="url(#grid)"/>

  <!-- CI green pill -->
  <rect x="170" y="180" width="560" height="110" rx="55" fill="rgba(30,132,73,0.18)" stroke="#2ECC71" stroke-width="3"/>
  <circle cx="245" cy="235" r="30" fill="#2ECC71"/>
  <path d="M 230 235 L 241 247 L 262 222" fill="none" stroke="#10151F" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="300" y="252" fill="#2ECC71" font-size="44" font-weight="700">CI:全部通过</text>

  <!-- main title -->
  <text x="170" y="480" fill="#FFFFFF" font-size="128" font-weight="700">测试全绿,</text>
  <text x="170" y="650" fill="#FFFFFF" font-size="128" font-weight="700">但 AI 偷偷把你的<tspan fill="#F08C2E">系统改坏了</tspan></text>

  <!-- broken underline -->
  <path d="M 170 710 L 700 710 M 760 710 L 1300 710 M 1360 710 L 1700 710" stroke="#C0392B" stroke-width="10" stroke-linecap="round" stroke-dasharray="40,26"/>

  <!-- bottom row -->
  <text x="170" y="850" fill="#9AA7BD" font-size="48">开源工具 trustdiff:这个 diff,你信得过吗?</text>
  <rect x="1815" y="790" width="365" height="90" rx="45" fill="#F08C2E"/>
  <text x="1997" y="850" fill="#10151F" font-size="44" font-weight="700" text-anchor="middle">附三轮实测</text>
</svg>
