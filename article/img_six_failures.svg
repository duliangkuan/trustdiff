<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 940">
  <style>
    text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  </style>
  <rect width="1280" height="940" fill="#FBF6EC"/>
  <text x="640" y="78" fill="#3D3A33" font-size="40" font-weight="700" text-anchor="middle">AI 改代码的六种「测试全绿,实际坏了」</text>
  <rect x="560" y="100" width="160" height="6" rx="3" fill="#F08C2E"/>

  <!-- card 1 -->
  <rect x="60" y="150" width="555" height="220" rx="14" fill="#FFFFFF" stroke="#EADFC8" stroke-width="2"/>
  <circle cx="118" cy="208" r="26" fill="#F08C2E"/>
  <text x="118" y="219" fill="#FFFFFF" font-size="28" font-weight="700" text-anchor="middle">1</text>
  <text x="166" y="218" fill="#3D3A33" font-size="28" font-weight="700">静默契约漂移</text>
  <text x="92" y="278" fill="#6B675E" font-size="21">函数签名一个字没动,含义变了。</text>
  <text x="92" y="316" fill="#6B675E" font-size="21">超时从秒改成毫秒:你传的 60 秒,现在是 60 毫秒。</text>

  <!-- card 2 -->
  <rect x="665" y="150" width="555" height="220" rx="14" fill="#FFFFFF" stroke="#EADFC8" stroke-width="2"/>
  <circle cx="723" cy="208" r="26" fill="#F08C2E"/>
  <text x="723" y="219" fill="#FFFFFF" font-size="28" font-weight="700" text-anchor="middle">2</text>
  <text x="771" y="218" fill="#3D3A33" font-size="28" font-weight="700">越界改动</text>
  <text x="697" y="278" fill="#6B675E" font-size="21">说是修分页,确实修了;顺手把重试次数</text>
  <text x="697" y="316" fill="#6B675E" font-size="21">从 3 改成 0、公共函数改了名,描述里只字未提。</text>

  <!-- card 3 -->
  <rect x="60" y="400" width="555" height="220" rx="14" fill="#FFFFFF" stroke="#EADFC8" stroke-width="2"/>
  <circle cx="118" cy="458" r="26" fill="#F08C2E"/>
  <text x="118" y="469" fill="#FFFFFF" font-size="28" font-weight="700" text-anchor="middle">3</text>
  <text x="166" y="468" fill="#3D3A33" font-size="28" font-weight="700">假修复</text>
  <text x="92" y="528" fill="#6B675E" font-size="21">说修好了工单 bug,代码一个字节没变,</text>
  <text x="92" y="566" fill="#6B675E" font-size="21">只是加了一条断言永远为真的"回归测试"。</text>

  <!-- card 4 -->
  <rect x="665" y="400" width="555" height="220" rx="14" fill="#FFFFFF" stroke="#EADFC8" stroke-width="2"/>
  <circle cx="723" cy="458" r="26" fill="#F08C2E"/>
  <text x="723" y="469" fill="#FFFFFF" font-size="28" font-weight="700" text-anchor="middle">4</text>
  <text x="771" y="468" fill="#3D3A33" font-size="28" font-weight="700">测试掩蔽</text>
  <text x="697" y="528" fill="#6B675E" font-size="21">它改了哪个函数,就把哪个函数 mock 掉。</text>
  <text x="697" y="566" fill="#6B675E" font-size="21">测试套件从此测的是 mock,不是代码。</text>

  <!-- card 5 -->
  <rect x="60" y="650" width="555" height="220" rx="14" fill="#FFFFFF" stroke="#EADFC8" stroke-width="2"/>
  <circle cx="118" cy="708" r="26" fill="#F08C2E"/>
  <text x="118" y="719" fill="#FFFFFF" font-size="28" font-weight="700" text-anchor="middle">5</text>
  <text x="166" y="718" fill="#3D3A33" font-size="28" font-weight="700">吞错误</text>
  <text x="92" y="778" fill="#6B675E" font-size="21">"修好了偶发崩溃"= except Exception: continue。</text>
  <text x="92" y="816" fill="#6B675E" font-size="21">崩溃没了,失败的数据也无声无息地丢了。</text>

  <!-- card 6 -->
  <rect x="665" y="650" width="555" height="220" rx="14" fill="#FFFFFF" stroke="#EADFC8" stroke-width="2"/>
  <circle cx="723" cy="708" r="26" fill="#F08C2E"/>
  <text x="723" y="719" fill="#FFFFFF" font-size="28" font-weight="700" text-anchor="middle">6</text>
  <text x="771" y="718" fill="#3D3A33" font-size="28" font-weight="700">架构违规</text>
  <text x="697" y="778" fill="#6B675E" font-size="21">规矩写着"持久化必须走 Repository 层",</text>
  <text x="697" y="816" fill="#6B675E" font-size="21">它新写的模块直接 open() 了数据文件。</text>

  <text x="640" y="918" fill="#A89F8D" font-size="18" text-anchor="middle">每一种都能做到:双边测试全绿 · trustdiff 考场里的六味毒药</text>
</svg>
