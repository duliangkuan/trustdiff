<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 660">
  <style>
    text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
  </style>
  <rect width="1280" height="660" fill="#FBF6EC"/>
  <text x="640" y="76" fill="#3D3A33" font-size="38" font-weight="700" text-anchor="middle">三轮盲测成绩单:裸评审 vs 带 trustdiff</text>
  <rect x="565" y="98" width="150" height="6" rx="3" fill="#F08C2E"/>

  <!-- header row -->
  <rect x="80" y="140" width="1120" height="74" rx="10" fill="#3D3A33"/>
  <text x="290" y="186" fill="#FFFFFF" font-size="25" font-weight="700" text-anchor="middle">评审员 · 考场</text>
  <text x="725" y="186" fill="#FFFFFF" font-size="25" font-weight="700" text-anchor="middle">裸评审</text>
  <text x="1055" y="186" fill="#FFFFFF" font-size="25" font-weight="700" text-anchor="middle">带 trustdiff</text>

  <!-- row 1 -->
  <rect x="80" y="226" width="1120" height="86" rx="10" fill="#FFFFFF" stroke="#EADFC8" stroke-width="2"/>
  <text x="290" y="279" fill="#3D3A33" font-size="24" text-anchor="middle">Sonnet · 小考场</text>
  <text x="725" y="279" fill="#6B675E" font-size="24" text-anchor="middle">100% 检出 / 0 误报</text>
  <text x="1055" y="279" fill="#6B675E" font-size="24" text-anchor="middle">100% 检出 / 0 误报</text>

  <!-- row 2 -->
  <rect x="80" y="324" width="1120" height="86" rx="10" fill="#FFFFFF" stroke="#EADFC8" stroke-width="2"/>
  <text x="290" y="377" fill="#3D3A33" font-size="24" text-anchor="middle">Sonnet · 2000 行考场</text>
  <text x="725" y="377" fill="#6B675E" font-size="24" text-anchor="middle">100% 检出 / 0 误报</text>
  <text x="1055" y="377" fill="#6B675E" font-size="24" text-anchor="middle">100% 检出 / 0 误报</text>

  <!-- row 3 highlighted -->
  <rect x="80" y="422" width="1120" height="106" rx="10" fill="#FFF3E2" stroke="#F08C2E" stroke-width="3"/>
  <text x="290" y="473" fill="#3D3A33" font-size="25" font-weight="700" text-anchor="middle">Haiku · 2000 行考场</text>
  <text x="290" y="505" fill="#A89F8D" font-size="18" text-anchor="middle">(便宜模型,自动化评审主力)</text>
  <text x="725" y="473" fill="#C0392B" font-size="25" font-weight="700" text-anchor="middle">83% 检出 / 25% 误报</text>
  <text x="725" y="505" fill="#C0392B" font-size="18" text-anchor="middle">漏检毒药 + 误杀干净重构</text>
  <text x="1055" y="473" fill="#1E8449" font-size="25" font-weight="700" text-anchor="middle">100% 检出 / 0 误报</text>
  <text x="1055" y="505" fill="#1E8449" font-size="18" text-anchor="middle">追回漏检 + 放行误杀</text>

  <text x="640" y="582" fill="#6B675E" font-size="21" text-anchor="middle" font-weight="700">trustdiff 不是让聪明模型更聪明,是让便宜模型干出旗舰的活。</text>
  <text x="640" y="624" fill="#A89F8D" font-size="17" text-anchor="middle">每轮 10 个 PR(6 毒 4 净)· 评审 agent 全程盲测 · 考场与标准答案已随仓库开源</text>
</svg>
