<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 800">
  <style>
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Microsoft YaHei', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>
  <rect width="1500" height="800" fill="#0f172a"/>
  <rect width="1500" height="800" fill="url(#grid)"/>

  <text x="30" y="44" fill="white" font-size="17" font-weight="700">trustdiff — architecture</text>
  <text x="30" y="66" fill="#94a3b8" font-size="10">AI wrote it. Tests are green. But can you trust the diff?</text>

  <!-- ===== review pipeline region ===== -->
  <rect x="30" y="90" width="1440" height="380" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="44" y="110" fill="#22d3ee" font-size="10" font-weight="600">REVIEW PIPELINE (SKILL.md · 5 steps)</text>

  <!-- inputs -->
  <rect x="60" y="150" width="190" height="64" rx="6" fill="#0f172a"/>
  <rect x="60" y="150" width="190" height="64" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="155" y="177" fill="white" font-size="12" font-weight="600" text-anchor="middle">PR diff / snapshots</text>
  <text x="155" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">git range or before/after dirs</text>

  <rect x="60" y="250" width="190" height="64" rx="6" fill="#0f172a"/>
  <rect x="60" y="250" width="190" height="64" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="155" y="277" fill="white" font-size="12" font-weight="600" text-anchor="middle">Claimed intent</text>
  <text x="155" y="295" fill="#94a3b8" font-size="9" text-anchor="middle">PR description · commits</text>

  <!-- step 1+2 -->
  <rect x="320" y="150" width="210" height="64" rx="6" fill="#0f172a"/>
  <rect x="320" y="150" width="210" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="425" y="177" fill="white" font-size="12" font-weight="600" text-anchor="middle">1 · Pin the intent</text>
  <text x="425" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">one sentence, every hunk judged against it</text>

  <rect x="320" y="250" width="210" height="74" rx="6" fill="#0f172a"/>
  <rect x="320" y="250" width="210" height="74" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="425" y="277" fill="white" font-size="12" font-weight="600" text-anchor="middle">2 · Blast radius</text>
  <text x="425" y="294" fill="#94a3b8" font-size="9" text-anchor="middle">scripts/surface.py</text>
  <text x="425" y="310" fill="#94a3b8" font-size="9" text-anchor="middle">changed symbols + caller map</text>

  <!-- step 3 checklist -->
  <rect x="600" y="140" width="300" height="290" rx="8" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="614" y="160" fill="#34d399" font-size="10" font-weight="600">3 · 19-POINT CHECKLIST</text>
  <rect x="620" y="175" width="260" height="40" rx="5" fill="#0f172a"/>
  <rect x="620" y="175" width="260" height="40" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.2"/>
  <text x="750" y="200" fill="white" font-size="10" text-anchor="middle">S · Scope — orthogonal changes, config edits</text>
  <rect x="620" y="223" width="260" height="40" rx="5" fill="#0f172a"/>
  <rect x="620" y="223" width="260" height="40" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.2"/>
  <text x="750" y="248" fill="white" font-size="10" text-anchor="middle">C · Contract — semantics, units, ordering</text>
  <rect x="620" y="271" width="260" height="40" rx="5" fill="#0f172a"/>
  <rect x="620" y="271" width="260" height="40" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.2"/>
  <text x="750" y="296" fill="white" font-size="10" text-anchor="middle">T · Test honesty — mocks, weakened asserts</text>
  <rect x="620" y="319" width="260" height="40" rx="5" fill="#0f172a"/>
  <rect x="620" y="319" width="260" height="40" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.2"/>
  <text x="750" y="344" fill="white" font-size="10" text-anchor="middle">E · Errors &amp; state — swallowed exceptions</text>
  <rect x="620" y="367" width="260" height="40" rx="5" fill="#0f172a"/>
  <rect x="620" y="367" width="260" height="40" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.2"/>
  <text x="750" y="392" fill="white" font-size="10" text-anchor="middle">A · Architecture — CLAUDE.md / ADR rules</text>

  <!-- step 4 -->
  <rect x="970" y="200" width="220" height="84" rx="6" fill="#0f172a"/>
  <rect x="970" y="200" width="220" height="84" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1080" y="228" fill="white" font-size="12" font-weight="600" text-anchor="middle">4 · Verify every finding</text>
  <text x="1080" y="247" fill="#94a3b8" font-size="9" text-anchor="middle">file:line evidence ×2 (change + victim)</text>
  <text x="1080" y="264" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">"why did the tests miss it?"</text>

  <!-- step 5 -->
  <rect x="1260" y="200" width="180" height="84" rx="6" fill="#0f172a"/>
  <rect x="1260" y="200" width="180" height="84" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1350" y="228" fill="white" font-size="12" font-weight="600" text-anchor="middle">5 · Verdict JSON</text>
  <text x="1350" y="247" fill="#94a3b8" font-size="9" text-anchor="middle">pass | drift + findings</text>
  <text x="1350" y="264" fill="#94a3b8" font-size="9" text-anchor="middle">machine-readable → CI gate</text>

  <!-- anti-noise note -->
  <rect x="970" y="330" width="470" height="74" rx="6" fill="#0f172a"/>
  <rect x="970" y="330" width="470" height="74" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="1205" y="356" fill="white" font-size="11" font-weight="600" text-anchor="middle">Anti-noise rules</text>
  <text x="1205" y="375" fill="#94a3b8" font-size="9" text-anchor="middle">large diff ≠ drift · declared changes are in scope · clean refactors pass</text>
  <text x="1205" y="391" fill="#94a3b8" font-size="9" text-anchor="middle">no finding without verified evidence</text>

  <!-- pipeline arrows -->
  <line x1="250" y1="182" x2="318" y2="182" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="250" y1="282" x2="318" y2="285" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="182" x2="598" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="287" x2="598" y2="287" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="900" y1="242" x2="968" y2="242" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1190" y1="242" x2="1258" y2="242" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1205" y1="328" x2="1130" y2="288" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <!-- ===== benchmark region ===== -->
  <rect x="30" y="500" width="1440" height="240" rx="12" fill="none" stroke="#fb923c" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="44" y="520" fill="#fb923c" font-size="10" font-weight="600">SELF-BENCHMARK (ships with the repo · reproducible)</text>

  <rect x="60" y="560" width="280" height="84" rx="6" fill="#0f172a"/>
  <rect x="60" y="560" width="280" height="84" rx="6" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="200" y="588" fill="white" font-size="12" font-weight="600" text-anchor="middle">Fixtures · two scales</text>
  <text x="200" y="607" fill="#94a3b8" font-size="9" text-anchor="middle">toy (40–100 LOC) + 2k-LOC orderflow project</text>
  <text x="200" y="623" fill="#94a3b8" font-size="9" text-anchor="middle">6 planted failure modes + 4 clean decoys, all CI-green</text>

  <rect x="420" y="560" width="280" height="84" rx="6" fill="#0f172a"/>
  <rect x="420" y="560" width="280" height="84" rx="6" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="560" y="588" fill="white" font-size="12" font-weight="600" text-anchor="middle">Blind reviewer agents</text>
  <text x="560" y="607" fill="#94a3b8" font-size="9" text-anchor="middle">two arms: bare vs with-skill</text>
  <text x="560" y="623" fill="#94a3b8" font-size="9" text-anchor="middle">never see ground truth or other cases</text>

  <rect x="780" y="560" width="240" height="84" rx="6" fill="#0f172a"/>
  <rect x="780" y="560" width="240" height="84" rx="6" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="900" y="588" fill="white" font-size="12" font-weight="600" text-anchor="middle">eval/score.py</text>
  <text x="900" y="607" fill="#94a3b8" font-size="9" text-anchor="middle">detection ≥ 80% · FP ≤ 15%</text>
  <text x="900" y="623" fill="#94a3b8" font-size="9" text-anchor="middle">vs eval/truth*/ ground truth</text>

  <rect x="1100" y="548" width="340" height="108" rx="6" fill="#0f172a"/>
  <rect x="1100" y="548" width="340" height="108" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="1270" y="576" fill="white" font-size="12" font-weight="600" text-anchor="middle">Headline result</text>
  <text x="1270" y="598" fill="#94a3b8" font-size="10" text-anchor="middle">bare Haiku: 83% detection · 25% FP</text>
  <text x="1270" y="618" fill="#60a5fa" font-size="10" font-weight="700" text-anchor="middle">Haiku + trustdiff: 100% · 0% FP</text>
  <text x="1270" y="638" fill="#94a3b8" font-size="9" text-anchor="middle">frontier-level review floor on a cheap model</text>

  <line x1="340" y1="602" x2="418" y2="602" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="700" y1="602" x2="778" y2="602" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="1020" y1="602" x2="1098" y2="602" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- skill feeds benchmark arm -->
  <path d="M 560 470 L 560 558" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="575" y="500" fill="#22d3ee" font-size="9">with-skill arm loads SKILL.md</text>
</svg>
